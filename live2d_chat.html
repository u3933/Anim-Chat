<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>%%CHAT_TITLE%%</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1408">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="%%CHAT_TITLE%%">
<style>
/* ===== Theme Variables ===== */
:root {
  --bg-main:        #1a1408;
  --bg-chat:        #0a0800;
  --bg-bubble-ai:   #261800;
  --bg-bubble-user: #163044;
  --bg-canvas:      #FFEDEE;
  --text-main:      #f0e8d8;
  --text-ai:        #f0d890;
  --text-user:      #90d0ff;
  --accent:         #c07030;
  --accent-hover:   #d08040;
  --accent-light:   #f0c080;
  --border:         #443322;
  --border-light:   #332211;
  /* ボタン ON 状態（テーマで上書き） */
  --btn-on-bg:      #3a2010;
  --btn-on-text:    var(--accent-light);
  /* 自動生成: テーマに関わらず bg-main と text-main の中間色 */
  --text-muted:     color-mix(in srgb, var(--text-main) 40%, var(--bg-main));
  --bg-card:        color-mix(in srgb, var(--bg-bubble-ai) 60%, var(--bg-main));
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  background: var(--bg-main);
  color: var(--text-main);
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100dvh;
  overflow: hidden;
  padding: 10px 16px;
  gap: 8px;
}

.app-header {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  width: 100%;
  max-width: 960px;
  font-size: 15px;
  color: var(--accent-light);
  letter-spacing: 3px;
  padding: 4px 0;
}

/* メールボタン: PC/モバイル共通で右上固定 */
.mail-canvas-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  bottom: auto;
  left: auto;
  width: fit-content;
  z-index: 10;
  padding: 3px 10px;
  border-radius: 10px;
  border: 1px solid rgba(192, 112, 48, 0.35);
  background: rgba(0, 0, 0, 0.52);
  color: #c0a070;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.mail-canvas-btn:hover { background: rgba(60, 32, 8, 0.75); border-color: var(--accent); }

.layout-toggle-btn {
  position: absolute;
  right: 0;
  padding: 3px 11px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-main);
  color: #776655;
  font-size: 11px;
  cursor: pointer;
  letter-spacing: 0;
  transition: color 0.2s, border-color 0.2s;
}
.layout-toggle-btn:hover { color: var(--accent-light); border-color: var(--accent); }

.app-container {
  display: flex;
  gap: 14px;
  width: min(960px, 100%);
  flex: 1;
  min-height: 0;
}

/* ===== Mobile Layout ===== */
body.mobile-layout { padding: 8px 6px; }

body.mobile-layout .app-header { max-width: 430px; }

body.mobile-layout .app-container {
  flex-direction: column;
  width: 100%;
  max-width: 430px;
  gap: 6px;
  min-height: 0;
}

body.mobile-layout .avatar-panel { width: 100%; }

body.mobile-layout #canvas-wrapper {
  width: 100%;
  height: auto;
  aspect-ratio: 1 / 1;
  max-height: 50dvh;
}

body.mobile-layout .chat-panel { width: 100%; }

body.mobile-layout .tts-toggle { padding: 4px 9px; font-size: 10px; }

/* 小さい画面では自動的にモバイルレイアウトを適用（手動設定がある場合は上書き） */
@media (max-width: 640px) {
  body:not(.desktop-forced) .app-container { flex-direction: column; width: 100%; max-width: 430px; }
  body:not(.desktop-forced) .avatar-panel  { width: 100%; }
  body:not(.desktop-forced) #canvas-wrapper { width: 100%; height: auto; aspect-ratio: 1/1; max-height: 50dvh; }
  body:not(.desktop-forced) #live2d-canvas  { width: 100%; height: 100%; }
  body:not(.desktop-forced) .chat-panel     { width: 100%; }
}

/* ===== Avatar Panel ===== */
.avatar-panel {
  flex-shrink: 0;
  width: 500px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  position: relative;
  min-height: 0;
}

#canvas-wrapper {
  width: 100%;
  aspect-ratio: 1 / 1;
  max-height: calc(100dvh - 180px);
  background: var(--bg-canvas);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}

canvas { display: block; }

/* ===== Layer System ===== */
#bg-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  z-index: 0;
  display: none;
}

#live2d-canvas {
  width: 100%;
  height: 100%;
  position: relative;
  z-index: 1;
  cursor: grab;
  user-select: none;
}
#live2d-canvas.dragging { cursor: grabbing; }

#fg-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  z-index: 2;
  pointer-events: none;
  display: none;
}

#status {
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #9f9;
  background: rgba(0,0,0,0.55);
  padding: 2px 10px;
  border-radius: 10px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 3;
}

#speaking-indicator {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: #f0c080;
  background: rgba(0,0,0,0.65);
  padding: 2px 14px;
  border-radius: 10px;
  white-space: nowrap;
  display: none;
  pointer-events: none;
  z-index: 3;
}

/* ===== Controls Panel (collapsible) ===== */
#controls-toggle-btn {
  position: absolute;
  bottom: 8px;
  right: 8px;
  z-index: 3;
  padding: 3px 11px;
  border-radius: 10px;
  border: 1px solid rgba(192, 112, 48, 0.35);
  background: rgba(255, 255, 255, 0.52);
  color: #c0a070;
  font-size: 10px;
  cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
#controls-toggle-btn:hover {
  background: rgba(60, 32, 8, 0.75);
  border-color: var(--accent);
}

#controls-panel {
  display: flex;
  flex-direction: column;
  gap: 6px;
  overflow: hidden;
  max-height: 560px;
  opacity: 1;
  transition: max-height 0.3s ease, opacity 0.2s ease;
}

.tts-toggle.danger-toggle:hover { border-color: #c06050; color: #c06050; }
.tts-toggle.wizard-btn { border-color: var(--border); color: #a0b8d0; }
.tts-toggle.wizard-btn:hover { border-color: #6090c0; color: #b0d0f0; }
#controls-panel.collapsed {
  max-height: 0;
  opacity: 0;
}

/* ===== Layer Controls ===== */
.layer-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 4px;
  flex-wrap: wrap;
}

.tts-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 4px;
  font-size: 12px;
  color: #888;
}

.tts-toggle {
  padding: 5px 14px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-main);
  color: #888;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.tts-toggle.on {
  background: var(--btn-on-bg);
  border-color: var(--accent);
  color: var(--btn-on-text);
}
.tts-toggle:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}
.tts-controls {
  flex-wrap: wrap;
}

.speed-row {
  display: flex;
  align-items: center;
  gap: 6px;
}

input[type=range].speed-slider {
  width: 80px;
  accent-color: var(--accent);
  cursor: pointer;
}

/* ===== Chat Panel ===== */
.chat-panel {
  flex: 1;
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

#chat-messages {
  flex: 1;
  min-height: 0;
  background: var(--bg-chat);
  border-radius: 12px;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#chat-messages::-webkit-scrollbar { width: 4px; }
#chat-messages::-webkit-scrollbar-track { background: transparent; }
#chat-messages::-webkit-scrollbar-thumb { background: #3a2a10; border-radius: 2px; }

.msg-bubble {
  max-width: 92%;
  padding: 9px 13px;
  border-radius: 16px;
  font-size: 13px;
  line-height: 1.65;
  word-break: break-word;
}

.msg-user {
  background: var(--bg-bubble-user);
  color: var(--text-user);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.msg-ai {
  background: var(--bg-bubble-ai);
  color: var(--text-ai);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.msg-sys {
  font-size: 11px;
  color: #555;
  align-self: center;
  padding: 0;
  background: none;
}

.msg-name {
  font-size: 10px;
  opacity: 0.55;
  margin-bottom: 4px;
}

.msg-ts {
  display: block;
  font-size: 10px;
  opacity: 0.45;
  text-align: right;
  margin-top: 4px;
  line-height: 1;
  letter-spacing: 0;
}


.chat-input-area {
  display: flex;
  gap: 8px;
}

#user-input {
  flex: 1;
  padding: 10px 16px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: var(--text-main);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
#user-input:focus { border-color: var(--accent); }

#send-btn {
  padding: 10px 22px;
  border-radius: 20px;
  border: none;
  background: var(--accent);
  color: white;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.2s;
}
#send-btn:hover:not(:disabled) { background: var(--accent-hover); }
#send-btn:disabled { background: #3a3028; color: #666; cursor: not-allowed; }
#send-btn.abort-mode { background: #5a1a1a; color: #f08080; font-size: 2em; line-height: 1; }
#send-btn.abort-mode:hover { background: #7a2020; }

#attach-btn {
  padding: 10px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: #776655;
  font-size: 15px;
  cursor: pointer;
  flex-shrink: 0;
  transition: color 0.2s, border-color 0.2s;
}
#attach-btn:hover { color: var(--accent-light); border-color: var(--accent); }
#attach-btn.has-file { border-color: #c07030; color: #f0c080; background: #1e100a; }

#attach-chip {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 4px 12px;
  background: #1a0e04;
  border: 1px solid #554433;
  border-radius: 12px;
  font-size: 11px;
  color: #c0a070;
  flex-shrink: 0;
}
#attach-chip.visible { display: flex; }
#attach-chip-icon { font-size: 13px; }
#attach-chip-name { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#attach-chip-clear {
  background: none;
  border: none;
  color: #776655;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  padding: 0 2px;
}
#attach-chip-clear:hover { color: #e07060; }

.chat-input-row {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

/* ===== Mail Modal ===== */
#mail-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
#mail-modal-overlay.open { display: flex; }

#mail-modal {
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 10px;
  width: min(480px, 95vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.mail-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
  color: var(--accent-light);
  flex-shrink: 0;
}
.mail-modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1;
}
.mail-modal-close:hover { color: var(--accent-light); }

.mail-modal-body {
  overflow-y: auto;
  flex: 1;
  padding: 10px 14px;
}

/* --- Inbox list --- */
.mail-list { display: flex; flex-direction: column; gap: 6px; }
.mail-list-item {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.mail-list-item:hover { border-color: var(--accent); }
.mail-list-item.unread { border-left: 3px solid var(--accent-light); }
.mail-list-date { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.mail-list-preview { font-size: 12px; color: var(--text-ai); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mail-list-unread-dot {
  display: inline-block; width: 7px; height: 7px;
  background: var(--accent-light); border-radius: 50%; margin-right: 5px; vertical-align: middle;
}
.mail-empty { font-size: 12px; color: var(--text-muted); padding: 20px 0; text-align: center; }

/* --- Mail detail --- */
.mail-detail-back {
  background: none; border: none; color: var(--accent); font-size: 12px;
  cursor: pointer; padding: 0 0 8px 0; display: block;
}
.mail-detail-back:hover { color: var(--accent-light); }
.mail-detail-date { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }
.mail-detail-body {
  font-size: 13px; color: var(--text-main); line-height: 1.7;
  background: var(--bg-card); border: 1px solid var(--border-light);
  border-radius: 6px; padding: 12px; margin-bottom: 12px;
  white-space: pre-wrap;
}
.mail-add-to-chat-btn {
  width: 100%; padding: 8px; border-radius: 6px;
  background: var(--btn-on-bg); border: 1px solid var(--accent);
  color: var(--btn-on-text); font-size: 12px; cursor: pointer;
  transition: background 0.2s;
}
.mail-add-to-chat-btn:hover { background: var(--bg-bubble-ai); }
.mail-add-to-chat-btn:disabled { opacity: 0.4; cursor: default; }

/* --- Inbox button badge --- */
.mail-badge {
  position: absolute; top: -4px; right: -4px;
  background: #c04020; color: #fff;
  font-size: 9px; font-weight: bold;
  border-radius: 8px; padding: 0 4px; min-width: 14px;
  text-align: center; line-height: 14px;
  display: none;
}

/* ===== Monologue Modal ===== */
#monologue-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#monologue-modal-overlay.open { display: flex; }

#monologue-modal {
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: min(460px, 96vw);
  max-height: 88dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.monologue-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
  color: var(--accent-light);
  letter-spacing: 1px;
  flex-shrink: 0;
}
.monologue-modal-close {
  background: none; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; padding: 2px 6px; line-height: 1;
}
.monologue-modal-close:hover { color: var(--accent-light); }

.monologue-modal-body {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.monologue-modal-body::-webkit-scrollbar { width: 4px; }
.monologue-modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.mono-section-label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.mono-top-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.mono-toggle-label {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--text-ai); cursor: pointer; flex: 1;
}
.mono-toggle-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

.mono-status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-muted);
  padding: 2px 0;
}
.mono-status-row span { color: var(--text-ai); }

.mono-theme-list {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.mono-theme-item {
  display: flex;
  gap: 5px;
  align-items: center;
}
.mono-theme-input {
  flex: 1;
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: var(--text-ai);
  font-size: 12px;
  font-family: inherit;
  outline: none;
}
.mono-theme-input:focus { border-color: var(--accent); }
.mono-theme-del {
  padding: 4px 8px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
}
.mono-theme-del:hover { border-color: #a04030; color: #e06050; }

.mono-btn-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.mono-btn {
  padding: 7px 0;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-chat);
  color: var(--text-ai);
  font-size: 12px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}
.mono-btn:hover { border-color: var(--accent); color: var(--accent-light); }
.mono-btn.full { grid-column: 1 / -1; }
.mono-btn.primary {
  border-color: var(--accent);
  background: var(--btn-on-bg);
  color: var(--btn-on-text);
}
.mono-btn.primary:hover { border-color: var(--accent-hover); background: var(--bg-bubble-ai); }

.mono-stock-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
  max-height: 180px;
  overflow-y: auto;
}
.mono-stock-list::-webkit-scrollbar { width: 4px; }
.mono-stock-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.mono-stock-item {
  font-size: 11px;
  color: var(--text-ai);
  padding: 5px 8px;
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: 6px;
  line-height: 1.5;
}

/* ===== Memory Modal ===== */
#memory-modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#memory-modal-overlay.open { display: flex; }

#memory-modal {
  background: var(--bg-main);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: min(480px, 96vw);
  max-height: 88dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.memory-modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
  font-size: 13px;
  color: var(--accent-light);
  letter-spacing: 1px;
  flex-shrink: 0;
}
.memory-modal-header span { font-size: 11px; color: var(--text-muted); margin-left: 8px; }

.memory-modal-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
  padding: 2px 6px;
}
.memory-modal-close:hover { color: var(--accent-light); }

.memory-modal-body {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  overflow: hidden;
  flex: 1;
  min-height: 0;
}

.memory-top-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.memory-toggle-label {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text-ai);
  cursor: pointer;
  flex: 1;
}
.memory-toggle-label input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; }

.memory-extract-btn {
  padding: 4px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-chat);

<!-- Apply saved theme vars BEFORE first paint -->
<script>
(function(){
  try {
    var t = JSON.parse(localStorage.getItem('hiyori_theme_vars') || 'null');
    if (t) {
      var r = document.documentElement;
      var keys = ['--bg-main','--bg-chat','--bg-bubble-ai','--bg-bubble-user','--bg-canvas',
                  '--text-main','--text-ai','--text-user','--accent','--accent-hover',
                  '--accent-light','--border','--border-light',
                  '--btn-on-bg','--btn-on-text'];
      keys.forEach(function(k){ if(t[k]) r.style.setProperty(k, t[k]); });
    }
    var title = localStorage.getItem('hiyori_cfg_chat_title');
    if (title) {
      document.title = title;
      var m = document.querySelector('meta[name="apple-mobile-web-app-title"]');
      if (m) m.setAttribute('content', title);
    }
  } catch(e){}
})();
</script>

// ============================================================
// CONFIG  ※ 優先順位: (1) chat_start.ps1 注入値  (2) localStorage (wizard設定)  (3) ハードコードデフォルト
// ============================================================
function _ls(key, fallback) { try { return localStorage.getItem(key) || fallback; } catch(e){ return fallback; } }

const _GEMINI_KEY_RAW  = '%%GEMINI_API_KEY%%';
const GEMINI_API_KEY   = _GEMINI_KEY_RAW.startsWith('%%')  ? _ls('hiyori_cfg_gemini_api_key', '')  : _GEMINI_KEY_RAW;

const _GEMINI_MDL_RAW  = '%%GEMINI_MODEL%%';
const GEMINI_MODEL     = _GEMINI_MDL_RAW.startsWith('%%')  ? _ls('hiyori_cfg_gemini_model', 'gemini-2.0-flash') : _GEMINI_MDL_RAW;

const _PROVIDER_RAW    = '%%LLM_PROVIDER%%';
const LLM_PROVIDER     = _PROVIDER_RAW.startsWith('%%')    ? _ls('hiyori_cfg_llm_provider', 'gemini') : _PROVIDER_RAW;

const _BASE_URL_RAW    = '%%LLM_BASE_URL%%';
const LLM_BASE_URL     = _BASE_URL_RAW.startsWith('%%')    ? _ls('hiyori_cfg_llm_base_url', '') : _BASE_URL_RAW;

const _LLM_KEY_RAW     = '%%LLM_API_KEY%%';
const LLM_API_KEY      = _LLM_KEY_RAW.startsWith('%%')     ? _ls('hiyori_cfg_llm_api_key', '') : _LLM_KEY_RAW;

const _LLM_MDL_RAW     = '%%LLM_MODEL%%';
const LLM_MODEL        = _LLM_MDL_RAW.startsWith('%%')     ? _ls('hiyori_cfg_llm_model', '') : _LLM_MDL_RAW;

const _TTS_PRV_RAW     = '%%TTS_PROVIDER%%';
const TTS_PROVIDER     = _TTS_PRV_RAW.startsWith('%%')     ? _ls('hiyori_cfg_tts_provider', 'sbv2') : _TTS_PRV_RAW;

const _TTS_EP_RAW      = '%%TTS_ENDPOINT%%';
const TTS_ENDPOINT     = _TTS_EP_RAW.startsWith('%%')      ? _ls('hiyori_cfg_tts_endpoint', 'http://127.0.0.1:5000') : _TTS_EP_RAW;

const _TTS_MDL_RAW     = '%%TTS_MODEL%%';
const TTS_MODEL        = _TTS_MDL_RAW.startsWith('%%')     ? _ls('hiyori_cfg_tts_model', '') : _TTS_MDL_RAW;

// ※ 数値プレースホルダーはシングルクォートで囲み、chat_start.ps1側も対応
const _TTS_SID_RAW     = '%%TTS_SPEAKER_ID%%';
const TTS_SPEAKER_ID   = parseInt(_TTS_SID_RAW.startsWith('%%')
  ? _ls('hiyori_cfg_tts_speaker_id', '0') : _TTS_SID_RAW);

const _TTS_VOL_RAW     = '%%TTS_VOLUME%%';
const TTS_VOLUME       = parseFloat(_TTS_VOL_RAW.startsWith('%%')
  ? _ls('hiyori_cfg_tts_volume', '1.0') : _TTS_VOL_RAW);

const _TITLE_RAW       = '%%CHAT_TITLE%%';
const CHAT_TITLE       = _TITLE_RAW.startsWith('%%')       ? _ls('hiyori_cfg_chat_title', 'Anim Chat') : _TITLE_RAW;

let   TTS_DICT         = null;
const TTS_AUTO_DICT_KEY  = 'hiyori_tts_auto_dict';
let   TTS_AUTO_DICT      = {};

// LLMコード用 setParam（フラグ更新あり）
function setParam(id, value) {
  if (!live2dModel) return;
  if (id === 'ParamEyeLOpen' || id === 'ParamEyeROpen') {
    llmEyeClosed = (value <= 0.1);
  }
  if (id === 'ParamAngleX' || id === 'ParamAngleY' || id === 'ParamAngleZ') {
    llmHeadActive = true;

    headMotion.phase = 'idle';

  live2dModel.internalModel.coreModel.setParameterValueById(id, value, 1.0);
}

// ============================================================
// 自律動作ループ（v2 継承：まばたき・呼吸・頭の動き・PartArmA非表示）
// ============================================================
function lerpTo(current, target, speed, dt) {
  const diff = target - current;
  const step = speed * dt;
  if (Math.abs(diff) <= step) return target;
  return current + Math.sign(diff) * step;
}

function autonomousLoop(delta) {
  if (!live2dModel) return;
  const dt = delta / 60;

  // --- 呼吸 ---
  breath.t += dt * 0.5;
  setParamDirect('ParamBreath',     (Math.sin(breath.t) + 1) / 2);
  setParamDirect('ParamBodyAngleZ', Math.sin(breath.t) * 0.8);

  // --- PartArmA 非表示維持 ---
  try {
    const parts = live2dModel.internalModel.coreModel._model.parts;
    for (let i = 0; i < parts.ids.length; i++) {
      if (parts.ids[i] === 'PartArmA') parts.opacities[i] = 0;
    }
  } catch(e) {}

  // --- 頭・肩の自然な動き ---
  if (!llmHeadActive) {
    headMotion.timer += dt;

    if (headMotion.phase === 'idle') {
      if (headMotion.timer >= headMotion.interval) {
        const r = Math.random();
        if (r < 0.34) {
          headMotion.motionType = 'turnX';
          headMotion.targetX = (Math.random() - 0.5) * 20;
          headMotion.targetY = 0; headMotion.targetZ = 0; headMotion.targetBodyY = 0;
        } else if (r < 0.67) {
          headMotion.motionType = 'tiltZ';
          headMotion.targetZ = (Math.random() - 0.5) * 16;
          headMotion.targetX = 0; headMotion.targetY = 0; headMotion.targetBodyY = 0;
        } else {
          headMotion.motionType = 'nodY';
          headMotion.targetY     = -(8 + Math.random() * 8);
          headMotion.targetBodyY = -(1 + Math.random() * 2);
          headMotion.targetX = 0; headMotion.targetZ = 0;
        }
        headMotion.holdTime = 0.3 + Math.random() * 0.8;
        headMotion.phase = 'moving';
        headMotion.timer = 0;
      }

    } else if (headMotion.phase === 'moving') {
      headMotion.currentX     = lerpTo(headMotion.currentX,     headMotion.targetX,     headMotion.moveSpeed, dt);
      headMotion.currentY     = lerpTo(headMotion.currentY,     headMotion.targetY,     headMotion.moveSpeed, dt);
      headMotion.currentZ     = lerpTo(headMotion.currentZ,     headMotion.targetZ,     headMotion.moveSpeed, dt);
      headMotion.currentBodyY = lerpTo(headMotion.currentBodyY, headMotion.targetBodyY, headMotion.moveSpeed, dt);
      setParamDirect('ParamAngleX',     headMotion.currentX);
      setParamDirect('ParamAngleY',     headMotion.currentY);
      setParamDirect('ParamAngleZ',     headMotion.currentZ);
      setParamDirect('ParamBodyAngleY', headMotion.currentBodyY);

      const arrived = Math.abs(headMotion.currentX - headMotion.targetX) < 0.3 &&
                      Math.abs(headMotion.currentY - headMotion.targetY) < 0.3 &&
                      Math.abs(headMotion.currentZ - headMotion.targetZ) < 0.3;
      if (arrived) {
        headMotion.timer += dt;
        if (headMotion.timer >= headMotion.holdTime) {
          headMotion.phase = 'returning';
          headMotion.timer = 0;
        }
      }

    } else if (headMotion.phase === 'returning') {
      headMotion.currentX     = lerpTo(headMotion.currentX,     0, headMotion.returnSpeed, dt);
      headMotion.currentY     = lerpTo(headMotion.currentY,     0, headMotion.returnSpeed, dt);
      headMotion.currentZ     = lerpTo(headMotion.currentZ,     0, headMotion.returnSpeed, dt);
      headMotion.currentBodyY = lerpTo(headMotion.currentBodyY, 0, headMotion.returnSpeed, dt);
      setParamDirect('ParamAngleX',     headMotion.currentX);
      setParamDirect('ParamAngleY',     headMotion.currentY);
      setParamDirect('ParamAngleZ',     headMotion.currentZ);
      setParamDirect('ParamBodyAngleY', headMotion.currentBodyY);

      if (Math.abs(headMotion.currentX) < 0.1 && Math.abs(headMotion.currentY) < 0.1 &&
          Math.abs(headMotion.currentZ) < 0.1) {
        headMotion.currentX = headMotion.currentY = headMotion.currentZ = headMotion.currentBodyY = 0;
        headMotion.phase    = 'idle';
        headMotion.timer    = 0;
        headMotion.interval = 8.0 + Math.random() * 12.0;
      }
    }
  }

  // --- まばたき（LLMが目を閉じている間はスキップ）---
  if (llmEyeClosed) {
    blink.phase = 'open'; blink.value = 1.0; blink.timer = 0;
    blink.interval = 3.0 + Math.random() * 3.0;
    return;
  }

  if (blink.phase === 'open') {
    blink.timer += dt;
    if (blink.timer >= blink.interval) { blink.phase = 'closing'; blink.timer = 0; }
  } else if (blink.phase === 'closing') {
    blink.value -= blink.closeSpeed * dt;
    if (blink.value <= 0) { blink.value = 0; blink.phase = 'opening'; }
    setParamDirect('ParamEyeLOpen', blink.value);
    setParamDirect('ParamEyeROpen', blink.value);
  } else if (blink.phase === 'opening') {
    blink.value += blink.openSpeed * dt;
    if (blink.value >= 1.0) {
      blink.value = 1.0; blink.phase = 'open';
      blink.interval = 3.0 + Math.random() * 3.0;
    }
    setParamDirect('ParamEyeLOpen', blink.value);
    setParamDirect('ParamEyeROpen', blink.value);
  }
}

/**
 * tts_dict.yaml をサーバーから取得して TTS_DICT にセットする
 * YAML形式: words: の下に  表記: かな読み  が並ぶ（Cafe-Lumiere 互換）
 * ファイルが存在しない場合は静かに無視する
 */
async function loadTTSDict() {
  try {
    const res = await fetch('tts_dict.yaml');
    if (!res.ok) return;
    const text = await res.text();
    const dict = {};
    let inWords = false;
    for (const line of text.split(/\r?\n/)) {
      const trimmed = line.trim();
      if (!trimmed || trimmed.startsWith('#')) continue;
      if (trimmed === 'words:') { inWords = true; continue; }
      if (inWords) {
        const m = trimmed.match(/^(.+?):\s+(.+)$/);
        if (m) dict[m[1].trim()] = m[2].trim();
      }
    }
    const count = Object.keys(dict).length;
    if (count > 0) {
      TTS_DICT = dict;
      console.log(`[TTS Dict] ${count} entries loaded from tts_dict.yaml`);
    }
  } catch (e) {
    // ファイルなし等は無視
  }
}

async function reloadTTSDict() {
  const prevDict = TTS_DICT;
  TTS_DICT = null;
  await loadTTSDict();
  const statusEl = document.getElementById('status');
  const count = TTS_DICT ? Object.keys(TTS_DICT).length : 0;
  if (count > 0) {
    const prev = statusEl.textContent;
    statusEl.textContent = `辞書再読込: ${count}件`;
    setTimeout(() => { statusEl.textContent = prev; }, 2500);
  } else {
    TTS_DICT = prevDict; // 失敗したら元に戻す
    alert('tts_dict.yaml が見つかりませんでした');
  }
}

/**
 * テキストから未知の英単語を抽出（手動辞書・自動辞書・pending に含まれないもの）
 */
function extractUnknownEnglish(text) {
  const words = [];
  const seen = new Set();
  const re = /[a-zA-Z][a-zA-Z0-9\-]*/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const word = m[0];
    if (seen.has(word.toLowerCase())) continue;
    seen.add(word.toLowerCase());
    // 手動辞書に大文字小文字無視でヒットするか確認
    const inManual = TTS_DICT && Object.keys(TTS_DICT).some(
      k => /^[a-zA-Z0-9\-\.]+$/.test(k) && k.toLowerCase() === word.toLowerCase()
    );
    if (inManual) continue;
    if (TTS_AUTO_DICT[word.toLowerCase()] !== undefined) continue;
    if (ttsPendingWords.has(word.toLowerCase())) continue;
    words.push(word);
  }
  return words;
}

/**
 * 自動キャッシュを適用する（手動辞書適用後に呼ぶ）
 */
function applyTTSAutoDict(text) {
  if (!TTS_AUTO_DICT || Object.keys(TTS_AUTO_DICT).length === 0) return text;
  const entries = Object.entries(TTS_AUTO_DICT)
    .sort((a, b) => b[0].length - a[0].length);
  for (const [word, reading] of entries) {
    if (!reading) continue;
    const escaped = word.replace(/[.+*?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(?<![a-zA-Z0-9])' + escaped + '(?![a-zA-Z0-9])', 'gi');
    text = text.replace(re, reading);
  }
  return text;
}

/**
 * 英単語リストをLLMに送ってひらがな読みを取得し、キャッシュに保存する（非同期・ノンブロッキング）
 */
async function lookupKanaBackground(words) {
  if (!words || words.length === 0) return;
  // pending に追加（重複リクエスト防止）
  for (const w of words) ttsPendingWords.add(w.toLowerCase());

  const wordList = words.join('、');
  const prompt =
    '以下の英単語・固有名詞を日本語TTSシステム向けのひらがな読みに変換してください。\n' +
    '日本語で一般的に使われるカタカナ読みをひらがなで返してください。\n' +
    'JSON形式のみで出力してください（説明・コードブロック不要）。\n\n' +
    `変換対象: ${wordList}\n\n` +
    `出力例: {"Day": "でい", "TikTok": "てぃっくとっく", "menu": "めにゅー"}`;

  try {
    let result = null;
    if (LLM_PROVIDER === 'gemini') {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ role: 'user', parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.1, responseMimeType: 'application/json' }
          })
        }
      );
      if (res.ok) {
        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
        result = JSON.parse(text);
      }
    } else {
      // OpenAI-compatible
      const res = await fetch(`${LLM_BASE_URL}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...(LLM_API_KEY ? { 'Authorization': `Bearer ${LLM_API_KEY}` } : {})
        },
        body: JSON.stringify({
          model: LLM_MODEL,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.1
        })
      });
      if (res.ok) {
        const data = await res.json();
        let text = data?.choices?.[0]?.message?.content || '';
        // コードブロックがあれば除去
        text = text.replace(/```(?:json)?\n?/g, '').replace(/```/g, '').trim();
        result = JSON.parse(text);
      }
    }
    if (result && typeof result === 'object') {
      for (const [orig, kana] of Object.entries(result)) {
        TTS_AUTO_DICT[orig.toLowerCase()] = kana;
      }
      saveTTSAutoDict();
      console.log('[TTS Auto] kana cached:', result);
    }
  } catch (e) {
    console.warn('[TTS Auto] lookup failed:', e);
  } finally {
    for (const w of words) ttsPendingWords.delete(w.toLowerCase());
  }
}

/**
 * TTS_DICT を使って英単語・漢字をかな読みに変換する（クリーニング前に適用）
 *
 * マッチルール（tts_dict.yaml のコメントと同じ仕様）:
 *   - ASCII系キー（英数字・ハイフン・ピリオドのみ）: 大文字小文字無視・前後が英数字でない位置でマッチ
 *   - 日本語を含むキー: 完全一致（replaceAll）
 *   - 長いキーから優先適用（部分一致の問題を防ぐ）
 */
function applyTTSDict(text) {
  if (!TTS_DICT) return text;
  const entries = Object.entries(TTS_DICT)
    .sort((a, b) => b[0].length - a[0].length); // 長いキーを優先
  for (const [word, reading] of entries) {
    if (/^[a-zA-Z0-9\-\.]+$/.test(word)) {
      // ASCII系: 前後が英数字でない位置でマッチ（lookbehind/lookahead で単語境界を模倣）
      const escaped = word.replace(/[.+*?^${}()|[\]\\]/g, '\\$&');
      const re = new RegExp('(?<![a-zA-Z0-9])' + escaped + '(?![a-zA-Z0-9])', 'gi');
      text = text.replace(re, reading);
    } else {
      // 日本語含む: 完全一致
      text = text.replaceAll(word, reading);
    }
  }
  return text;
}

/**
 * TTS送信前クリーニング: 辞書置換 → 絵文字・特殊記号を除去し日本語/ASCII のみ残す
 */
function cleanForTTS(text) {
  text = applyTTSDict(text);     // 手動辞書（優先）
  // 未知英単語をバックグラウンドでLLMに問い合わせ（今回のTTSには間に合わないが次回から反映）
  const unknowns = extractUnknownEnglish(text);
  if (unknowns.length > 0) lookupKanaBackground(unknowns); // fire-and-forget
  text = applyTTSAutoDict(text); // 自動かな辞書（手動辞書適用後）
  return text
    .replace(/[^\w\s。、！？!?\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF\u3400-\u4DBFa-zA-Z0-9ー〜～・\u2026]/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

/**
 * テキストを句読点で分割（最大maxLength文字/チャンク）
 * Cafe-Lumiere TTSClient.split_text と同等のロジック
 */
function splitTextForTTS(text, maxLength = 100) {
  const sentences = text.split(/(?<=[。！？])/);
  const chunks = [];
  for (const s of sentences) {
    const trimmed = s.trim();
    if (!trimmed) continue;
    if (trimmed.length <= maxLength) {
      chunks.push(trimmed);
    } else {
      for (let i = 0; i < trimmed.length; i += maxLength) {
        chunks.push(trimmed.slice(i, i + maxLength));
      }
    }
  }
  return chunks;
}

// ============================================================
// TTS 再生 + リップシンク（Web Audio API）
// ============================================================
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// Mobile AudioContext unlock
// iOS/Android requires AudioContext.resume() to be called synchronously
// inside a user-gesture handler. Register on both touch and click.
function _unlockAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
document.addEventListener('touchstart', _unlockAudioCtx, { passive: true });
document.addEventListener('click',      _unlockAudioCtx, { passive: true });

/**
 * テキストを分割してTTSで順次再生し、Web Audio API でリップシンクを駆動する。
 * 新しい呼び出しが来たら前の再生をキャンセルする（ttsCancelId で管理）。
 */
/**
 * @param {string}   text       発話テキスト（分割・クリーニングはここで行う）
 * @param {string[]} animCodes  チャンクと同じ長さの表情コード配列（null 要素はスキップ）
 */
async function playTTSWithLipSync(text, animCodes = []) {
  if (!ttsEnabled) return;

  // 進行中のTTSをキャンセル
  ttsCancelId++;
  const myId = ttsCancelId;
  if (currentSource) {
    try { currentSource.stop(); } catch(e) {}
    currentSource = null;
  }
  currentMouthVal = 0;
  setParamDirect('ParamMouthOpenY', 0);

  const chunks = splitTextForTTS(cleanForTTS(text));
  if (!chunks.length) return;

  isSpeaking = true;
  document.getElementById('speaking-indicator').style.display = 'block';

  try {
    for (let i = 0; i < chunks.length; i++) {
      if (myId !== ttsCancelId || !ttsEnabled) break;
      // チャンク再生前に対応する表情コードを適用
      if (animCodes[i]) applyAnimCode(animCodes[i]);
      await playTTSChunk(chunks[i], myId);
    }
  } catch(e) {
    console.warn('[TTS] playback error:', e);
  } finally {
    if (myId === ttsCancelId) {
      isSpeaking = false;
      currentMouthVal = 0;
      setParamDirect('ParamMouthOpenY', 0);
      document.getElementById('speaking-indicator').style.display = 'none';
    }
  }
}

async function playTTSChunk(text, cancelId) {
  try {
    let arrayBuf;

    if (TTS_PROVIDER === 'voicevox') {
      // VOICEVOX: POST /audio_query → POST /synthesis (2-step)
      const qResp = await fetch(
        `${TTS_ENDPOINT}/audio_query?${new URLSearchParams({ text, speaker: TTS_SPEAKER_ID })}`,
        { method: 'POST' }
      );
      if (!qResp.ok) throw new Error(`VOICEVOX audio_query ${qResp.status}`);
      if (cancelId !== ttsCancelId) return;
      const query = await qResp.json();
      query.speedScale = ttsSpeed;  // 話速を反映

      const sResp = await fetch(
        `${TTS_ENDPOINT}/synthesis?${new URLSearchParams({ speaker: TTS_SPEAKER_ID })}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(query) }
      );
      if (!sResp.ok) throw new Error(`VOICEVOX synthesis ${sResp.status}`);
      if (cancelId !== ttsCancelId) return;
      arrayBuf = await sResp.arrayBuffer();

    } else {
      // SBV2 (default): GET /voice
      const params = new URLSearchParams({
        text,
        model_name:     TTS_MODEL,
        length:         ttsSpeed,   // 話速（Style-Bert-VITS2 length scale）
        style_weight:   1.0,
        split_interval: 0.3,
      });
      const resp = await fetch(`${TTS_ENDPOINT}/voice?${params}`);
      if (!resp.ok) throw new Error(`TTS API ${resp.status}`);
      if (cancelId !== ttsCancelId) return;
      arrayBuf = await resp.arrayBuffer();
    }

    const ctx = getAudioCtx();
    const buffer = await ctx.decodeAudioData(arrayBuf);
    if (cancelId !== ttsCancelId) return;

    return new Promise((resolve) => {
      const analyser = ctx.createAnalyser();
      analyser.fftSize               = 512;
      analyser.smoothingTimeConstant = 0.5;

      const gainNode = ctx.createGain();
      gainNode.gain.value = TTS_VOLUME;

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      analyser.connect(gainNode);
      gainNode.connect(ctx.destination);
      currentSource = source;

      const dataArray = new Float32Array(analyser.fftSize);

      // RMS振幅 → ParamMouthOpenY でリップシンク
      function lipSyncFrame() {
        if (cancelId !== ttsCancelId) return;
        analyser.getFloatTimeDomainData(dataArray);
        let rms = 0;
        for (let v of dataArray) rms += v * v;
        rms = Math.sqrt(rms / dataArray.length);
        const target = Math.min(1.0, rms * 7.0);
        // スムージング（急激な変化を抑制）
        currentMouthVal = currentMouthVal * 0.55 + target * 0.45;
        setParamDirect('ParamMouthOpenY', currentMouthVal);
        requestAnimationFrame(lipSyncFrame);
      }

      source.onended = () => {
        currentSource   = null;
        currentMouthVal = 0;
        if (cancelId === ttsCancelId) setParamDirect('ParamMouthOpenY', 0);
        resolve();
      };

      source.start(0);
      lipSyncFrame();
    });

  } catch(e) {
    console.warn('[TTS] chunk error:', e.message);
    // TTS失敗時は口を閉じてスキップ（クラッシュしない）
    setParamDirect('ParamMouthOpenY', 0);
  }
}

// ============================================================
// 知識ベース（RAG） — knowledge/ フォルダのファイルを参照して回答を補強
// ============================================================
const KNOWLEDGE_CHUNK_SIZE = 400; // チャンク最大文字数
const KNOWLEDGE_TOP_K      = 3;   // 取得する上位チャンク数

async function loadKnowledge() {
  try {
    const res = await fetch('knowledge_manifest.json');
    if (!res.ok) return;
    const files = await res.json();
    if (!Array.isArray(files) || files.length === 0) return;

    const allChunks = [];
    let loadedCount = 0;

    for (const filename of files) {
      const ext = filename.split('.').pop().toLowerCase();
      let text = '';
      try {
        if (ext === 'pdf') {
          text = await extractPdfText(`knowledge/${filename}`);
        } else {
          const r = await fetch(`knowledge/${filename}`);
          if (r.ok) text = await r.text();
        }
      } catch(e) {
        console.warn(`[Knowledge] failed to load ${filename}:`, e);
        continue;
      }
      if (!text.trim()) continue;
      allChunks.push(...splitIntoChunks(text, filename));
      loadedCount++;
    }

    if (allChunks.length === 0) return;

    knowledgeChunks  = allChunks;
    knowledgeReady   = true;
    knowledgeEnabled = true;

    const btn = document.getElementById('knowledge-toggle');
    if (btn) {
      btn.textContent = '参照 ON';
      btn.classList.add('on');
      btn.disabled = false;
      btn.title = `${loadedCount}件のファイル（${allChunks.length}チャンク）`;
    }
    console.log(`[Knowledge] ${loadedCount} files, ${allChunks.length} chunks loaded`);
    addMsg('sys', `知識ベース: ${loadedCount}件のファイル（${allChunks.length}チャンク）を読み込みました`);

  } catch(e) {
    console.warn('[Knowledge] load error:', e);
  }
}

function splitIntoChunks(text, source) {
  const chunks = [];
  let current = '';
  for (const para of text.split(/\n{2,}/)) {
    const p = para.trim();
    if (!p) continue;
    if (current.length + p.length > KNOWLEDGE_CHUNK_SIZE && current.length > 0) {
      chunks.push({ text: current.trim(), source });
      current = p;
    } else {
      current += (current ? '\n\n' : '') + p;
    }
  }
  if (current.trim()) chunks.push({ text: current.trim(), source });
  return chunks;
}

async function extractPdfText(url) {
  if (typeof pdfjsLib === 'undefined') {
    console.warn('[Knowledge] PDF.js not loaded, skipping:', url);
    return '';
  }
  if (!pdfjsLib.GlobalWorkerOptions.workerSrc) {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }
  try {
    const pdf = await pdfjsLib.getDocument(url).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n';
    }
    return text;
  } catch(e) {
    console.warn('[Knowledge] PDF parse error:', url, e);
    return '';
  }
}

function getBigrams(text) {
  const clean = text.toLowerCase().replace(/\s+/g, '');
  const bigrams = new Set();
  for (let i = 0; i < clean.length - 1; i++) {
    bigrams.add(clean.slice(i, i + 2));
  }
  return bigrams;
}

function retrieveContext(query) {
  if (!knowledgeReady || !knowledgeEnabled || knowledgeChunks.length === 0) return [];
  const qBigrams = getBigrams(query);
  if (qBigrams.size === 0) return [];
  const scored = knowledgeChunks.map(chunk => {
    const cBigrams = getBigrams(chunk.text);
    let overlap = 0;
    for (const bg of qBigrams) { if (cBigrams.has(bg)) overlap++; }
    return { ...chunk, score: overlap / qBigrams.size };
  });
  return scored
    .filter(c => c.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, KNOWLEDGE_TOP_K);
}

function buildKnowledgeContext(query) {
  const chunks = retrieveContext(query);
  if (chunks.length === 0) { lastKnowledgeSources = null; return null; }
  lastKnowledgeSources = [...new Set(chunks.map(c => c.source))];
  const body = chunks.map(c => `（出典: ${c.source}）\n${c.text}`).join('\n\n---\n\n');
  return `【参照情報】\n${body}`;
}

  knowledgeEnabled = !knowledgeEnabled;

  btn.classList.toggle('on', knowledgeEnabled);
}

// ============================================================
// アバター 移動・拡縮（マウス操作）
// ============================================================
function applyAvatarTransform() {
  if (!live2dModel) return;
  live2dModel.scale.set(AVATAR_BASE_SCALE * avatarScaleMulti);
  live2dModel.x = AVATAR_BASE_X + avatarOffsetX;
  live2dModel.y = AVATAR_BASE_Y + avatarOffsetY;
}

function resetAvatarTransform() {
  avatarOffsetX    = 0;
  avatarOffsetY    = 0;
  avatarScaleMulti = 1.0;
  applyAvatarTransform();
  saveAvatarTransform();
}

(function initAvatarMouse() {
  const canvas = document.getElementById('live2d-canvas');

  canvas.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    // CSS表示サイズとPIXI論理サイズ（500px）の比率を記録しておく
    // モバイルでキャンバスが縮小表示されている場合に1CSSピクセル≠1PIXIピクセルになるため
    const rect = canvas.getBoundingClientRect();
    dragScaleX       = 500 / rect.width;
    dragScaleY       = 500 / rect.height;
    isDraggingAvatar = true;
    dragStartX       = e.clientX;
    dragStartY       = e.clientY;
    dragStartOffsetX = avatarOffsetX;
    dragStartOffsetY = avatarOffsetY;
    canvas.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDraggingAvatar) return;
    avatarOffsetX = dragStartOffsetX + (e.clientX - dragStartX) * dragScaleX;
    avatarOffsetY = dragStartOffsetY + (e.clientY - dragStartY) * dragScaleY;
    applyAvatarTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!isDraggingAvatar) return;
    isDraggingAvatar = false;
    canvas.classList.remove('dragging');
    saveAvatarTransform(); // ドラッグ終了時に保存
  });

  let _wheelSaveTimer = null;
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 0.08 : -0.08;
    avatarScaleMulti = Math.max(0.2, Math.min(5.0, avatarScaleMulti + delta));
    applyAvatarTransform();
    clearTimeout(_wheelSaveTimer);
    _wheelSaveTimer = setTimeout(saveAvatarTransform, 500);
  }, { passive: false });

  // ---- Touch events (mobile): 1 finger = pan, 2 fingers = pinch zoom ----
  let pinchStartDist  = 0;
  let pinchStartScale = 1.0;

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
      const t    = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      dragScaleX       = 500 / rect.width;
      dragScaleY       = 500 / rect.height;
      isDraggingAvatar = true;
      dragStartX       = t.clientX;
      dragStartY       = t.clientY;
      dragStartOffsetX = avatarOffsetX;
      dragStartOffsetY = avatarOffsetY;
    } else if (e.touches.length === 2) {
      isDraggingAvatar = false;
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchStartDist  = Math.hypot(dx, dy);
      pinchStartScale = avatarScaleMulti;
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && isDraggingAvatar) {
      const t = e.touches[0];
      avatarOffsetX = dragStartOffsetX + (t.clientX - dragStartX) * dragScaleX;
      avatarOffsetY = dragStartOffsetY + (t.clientY - dragStartY) * dragScaleY;
      applyAvatarTransform();
    } else if (e.touches.length === 2 && pinchStartDist > 0) {
      const dx   = e.touches[0].clientX - e.touches[1].clientX;
      const dy   = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.hypot(dx, dy);
      avatarScaleMulti = Math.max(0.2, Math.min(5.0, pinchStartScale * dist / pinchStartDist));
      applyAvatarTransform();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    if (e.touches.length === 0) {
      if (isDraggingAvatar) saveAvatarTransform();
      isDraggingAvatar = false;
    }
    if (e.touches.length < 2 && pinchStartDist > 0) {
      clearTimeout(_wheelSaveTimer);
      _wheelSaveTimer = setTimeout(saveAvatarTransform, 500);
      pinchStartDist = 0;
    }
  });
})();

function setLayerFromInput(layerId, input) {
  const file = input.files[0];
  if (!file) return;
  const el  = document.getElementById(layerId);
  const url = URL.createObjectURL(file);
  if (el._objectUrl) URL.revokeObjectURL(el._objectUrl);
  el._objectUrl = url;
  el.src = url;
  el.style.display = 'block';
  input.value = '';
  // IndexedDB に保存（ページ再読み込み後も復元できるよう Blob を保持）
  saveLayerBlob(layerId, file).catch(e => console.warn('[Layer] save failed:', e));
}

function clearLayer(layerId) {
  const el = document.getElementById(layerId);
  if (el._objectUrl) { URL.revokeObjectURL(el._objectUrl); el._objectUrl = null; }
  el.src = '';
  el.style.display = 'none';
  deleteLayerBlob(layerId).catch(() => {});
}

// ============================================================
// 設定の永続化（アバター変形: localStorage、レイヤー画像: IndexedDB）
// ============================================================
// --- アバター変形 ---
function saveAvatarTransform() {
  try {
    localStorage.setItem(TRANSFORM_KEY, JSON.stringify({
      offsetX: avatarOffsetX, offsetY: avatarOffsetY, scaleMulti: avatarScaleMulti,
    }));
  } catch(e) {}
}

function restoreAvatarTransform() {
  try {
    const saved = localStorage.getItem(TRANSFORM_KEY);
    if (!saved) return;
    const t = JSON.parse(saved);
    avatarOffsetX    = t.offsetX    ?? 0;
    avatarOffsetY    = t.offsetY    ?? 0;
    avatarScaleMulti = t.scaleMulti ?? 1.0;
  } catch(e) {}
}

// --- IndexedDB ヘルパー（レイヤー画像）---
function _openLayerDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(LAYER_DB_NAME, 1);
    req.onupgradeneeded = (e) => e.target.result.createObjectStore('layers');
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror   = (e) => reject(e.target.error);
  });
}

async function saveLayerBlob(key, blob) {
  const db = await _openLayerDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('layers', 'readwrite');
    tx.objectStore('layers').put(blob, key);
    tx.oncomplete = () => resolve();
    tx.onerror    = (e) => reject(e.target.error);
  });
}

async function loadLayerBlob(key) {
  const db = await _openLayerDB();
  return new Promise((resolve, reject) => {
    const tx  = db.transaction('layers', 'readonly');
    const req = tx.objectStore('layers').get(key);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror   = (e) => reject(e.target.error);
  });
}

async function deleteLayerBlob(key) {
  const db = await _openLayerDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('layers', 'readwrite');
    tx.objectStore('layers').delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror    = (e) => reject(e.target.error);
  });
}

async function restoreLayerImages() {
  for (const layerId of ['bg-layer', 'fg-layer']) {
    try {
      const blob = await loadLayerBlob(layerId);
      if (!blob) continue;
      const el  = document.getElementById(layerId);
      const url = URL.createObjectURL(blob);
      if (el._objectUrl) URL.revokeObjectURL(el._objectUrl);
      el._objectUrl = url;
      el.src = url;
      el.style.display = 'block';
    } catch(e) {
      console.warn(`[Layer] restore ${layerId} failed:`, e);
    }
  }
}

// ============================================================
// LLM パラメータ仕様（アニメーションLLM用プロンプトで参照）
// ============================================================
const PARAM_SPEC = `
=== LIVE2D PARAMETER SPEC ===
FACE: ParamAngleX/Y/Z(-100~100,default:0), ParamCheek(-1~1,blush)
EYES: ParamEyeLOpen/ROpen(0~1.2,default:1), ParamEyeLSmile/RSmile(0~1), ParamEyeBallX/Y(-1~1)
BROWS: ParamBrowLY/RY(-1~1), ParamBrowLAngle/RAngle(-1~1), ParamBrowLForm/RForm(-1~1,-1=sad,1=raised)
MOUTH: ParamMouthForm(-2~1,1=smile,0=neutral,-2=frown), ParamMouthOpenY(0~1) ※lip-sync overrides this
BODY: ParamBodyAngleX(-10~10), ParamShoulder(-1~1)
ARMS: ParamArmLB/RB(-100~100,10=open outward), ParamHandLB/RB(-10~10,default=10), ParamHandL/R(-1~1,1=open)
FORBIDDEN: Do NOT set ParamBreath, ParamBodyAngleZ, ParamBodyAngleY (autonomous loop).
`.trim();

/** アニメーション用プロンプト文字列を生成（プロバイダー共通） */
function buildAnimPrompt(userMessage, aiResponse, chunks) {
  const chunkList = chunks.map((c, i) => `[${i}] "${c}"`).join('\n');
  return (
`You control Live2D character Hiyori's facial expressions as she speaks.
She speaks these text segments one by one (TTS chunks):
${chunkList}

Context — User said: "${userMessage}"
Context — Hiyori's full response: "${aiResponse}"

For each segment, assign one expression code snippet.
Rules:
1. Return ONLY a JSON array. No markdown, no explanation.
   Format: [{"i":0,"code":"..."},{"i":1,"code":"..."},...]
2. Each "code" must start with: if(window.__animId){cancelAnimationFrame(window.__animId);window.__animId=null;}
3. Do NOT set ParamMouthOpenY (lip-sync controls it).
4. For segments [0] to [${chunks.length - 2}] (non-last): use STATIC setParam() only — no animation loops.
5. For the LAST segment [${chunks.length - 1}]: may use requestAnimationFrame loop if emotion calls for it (excited, waving, etc.).
6. Vary expressions naturally across segments to show nuance (e.g. curious → relieved, shy → happy).

${PARAM_SPEC}

Static expression snippets (use these as building blocks):
happy:    setParam('ParamEyeLSmile',1);setParam('ParamEyeRSmile',1);setParam('ParamMouthForm',1);setParam('ParamBrowLY',0.5);setParam('ParamBrowRY',0.5);setParam('ParamCheek',0.5);
thinking: setParam('ParamAngleZ',10);setParam('ParamEyeBallY',0.3);setParam('ParamBrowLY',0.3);setParam('ParamBrowRY',0.3);setParam('ParamMouthForm',0.5);
sad:      setParam('ParamMouthForm',-2);setParam('ParamBrowLY',-1);setParam('ParamBrowRY',-1);setParam('ParamBrowLForm',-1);setParam('ParamBrowRForm',-1);setParam('ParamEyeLOpen',0.6);setParam('ParamEyeROpen',0.6);
surprised:setParam('ParamEyeLOpen',1.2);setParam('ParamEyeROpen',1.2);setParam('ParamBrowLY',1);setParam('ParamBrowRY',1);setParam('ParamMouthForm',0);
shy:      setParam('ParamCheek',1);setParam('ParamAngleY',-15);setParam('ParamAngleZ',5);setParam('ParamEyeLSmile',0.5);setParam('ParamEyeRSmile',0.5);
excited(loop,last-only): let t=0;function f(){t+=0.12;setParam('ParamArmRB',Math.sin(t)*10);setParam('ParamHandR',1);setParam('ParamEyeLSmile',0.8);setParam('ParamEyeRSmile',0.8);setParam('ParamMouthForm',1);window.__animId=requestAnimationFrame(f);}window.__animId=requestAnimationFrame(f);`
  );
}

/** JSON レスポンスを共通パース（Gemini / OpenAI どちらの返答テキストにも使用） */
function parseAnimResponse(rawText, chunkCount) {
  const raw = (rawText || '').replace(/```[\w]*\n?/g, '').replace(/```/g, '').trim();
  const parsed = JSON.parse(raw);
  const result = new Array(chunkCount).fill(null);
  for (const item of parsed) {
    if (typeof item.i === 'number' && item.i < chunkCount && item.code) {
      result[item.i] = item.code;
    }
  }
  return result;
}

// ---- Gemini ----

async function callGeminiChat(userMessage) {
  const knowledgeCtx = buildKnowledgeContext(userMessage);
  const userContent  = knowledgeCtx
    ? `${knowledgeCtx}\n\n---\n上記の参照情報を踏まえて回答してください。\nユーザー: ${userMessage}`
    : userMessage;

  // Build user parts (text + optional attachment)
  const userParts = [];
  if (attachedFileType === 'text' && attachedTextContent) {
    userParts.push({ text: `【添付ファイル: ${attachedFileName}】\n${attachedTextContent}\n\n---\n${userContent}` });
  } else if (attachedFileType === 'image' && attachedBase64) {
    userParts.push({ text: userContent });
    userParts.push({ inlineData: { mimeType: attachedMimeType, data: attachedBase64 } });
  } else {
    userParts.push({ text: userContent });
  }

  const contents = [
    ...chatHistory.slice(-(MAX_HISTORY * 2)),
    { role: 'user', parts: userParts },
  ];
  const memCtx = await buildMemoryContext();
  const body = {
    system_instruction: { parts: [{ text: CHAT_SYSTEM_PROMPT + memCtx }] },
    contents,
    generationConfig: { temperature: 0.85, maxOutputTokens: 300 },
  };
  if (groundingEnabled) body.tools = [{ googleSearch: {} }];

  const resp = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
      signal: chatAbortController?.signal }
  );
  if (!resp.ok) {
    const err = await resp.json();
    throw new Error(err.error?.message || `Gemini Chat HTTP ${resp.status}`);
  }
  const data = await resp.json();

  // グラウンディングで使った検索クエリを保存（sendMessage 側で表示）
  lastSearchQueries = data.candidates?.[0]?.groundingMetadata?.webSearchQueries || null;

  return (data.candidates?.[0]?.content?.parts?.[0]?.text || '').trim()
    || 'ごめんね、うまく答えられなかったよ。';
}

async function callGeminiAnimChunks(userMessage, aiResponse, chunks) {
  if (!chunks || chunks.length === 0) return [];
  const prompt = buildAnimPrompt(userMessage, aiResponse, chunks);
  try {
    const resp = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.4, maxOutputTokens: 1200 },
        }),
      }
    );
    if (!resp.ok) return new Array(chunks.length).fill(null);
    const data = await resp.json();
    return parseAnimResponse(data.candidates?.[0]?.content?.parts?.[0]?.text, chunks.length);
  } catch(e) {
    console.warn('[AnimChunks/Gemini] error:', e.message);
    return new Array(chunks.length).fill(null);
  }
}

// ---- OpenAI-compatible ----

async function callOpenAIChat(userMessage) {
  const knowledgeCtx = buildKnowledgeContext(userMessage);
  const userContent  = knowledgeCtx
    ? `${knowledgeCtx}\n\n---\n上記の参照情報を踏まえて回答してください。\nユーザー: ${userMessage}`
    : userMessage;
  const memCtx = await buildMemoryContext();

  // Build user message content (text + optional attachment)
  let userMsgContent;
  if (attachedFileType === 'text' && attachedTextContent) {
    userMsgContent = `【添付ファイル: ${attachedFileName}】\n${attachedTextContent}\n\n---\n${userContent}`;
  } else if (attachedFileType === 'image' && attachedBase64) {
    userMsgContent = [
      { type: 'text', text: userContent },
      { type: 'image_url', image_url: { url: `data:${attachedMimeType};base64,${attachedBase64}` } },
    ];
  } else {
    userMsgContent = userContent;
  }

  const messages = [
    { role: 'system', content: CHAT_SYSTEM_PROMPT + memCtx },
    ...chatHistory.slice(-(MAX_HISTORY * 2)).map(m => ({
      role: m.role === 'model' ? 'assistant' : 'user',
      content: m.parts[0].text,
    })),
    { role: 'user', content: userMsgContent },
  ];
  const headers = { 'Content-Type': 'application/json' };
  if (LLM_API_KEY) headers['Authorization'] = `Bearer ${LLM_API_KEY}`;

  const resp = await fetch(`${LLM_BASE_URL}/chat/completions`, {
    method: 'POST',
    headers,
    body: JSON.stringify({ model: LLM_MODEL, messages, temperature: 0.85 }),
    signal: chatAbortController?.signal,
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `OpenAI Chat HTTP ${resp.status}`);
  }
  const data = await resp.json();
  return (data.choices?.[0]?.message?.content || '').trim()
    || 'ごめんね、うまく答えられなかったよ。';
}

async function callOpenAIAnimChunks(userMessage, aiResponse, chunks) {
  if (!chunks || chunks.length === 0) return [];
  const prompt = buildAnimPrompt(userMessage, aiResponse, chunks);
  const headers = { 'Content-Type': 'application/json' };
  if (LLM_API_KEY) headers['Authorization'] = `Bearer ${LLM_API_KEY}`;
  try {
    const resp = await fetch(`${LLM_BASE_URL}/chat/completions`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        model: LLM_MODEL,
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.4,
      }),
    });
    if (!resp.ok) return new Array(chunks.length).fill(null);
    const data = await resp.json();
    return parseAnimResponse(data.choices?.[0]?.message?.content, chunks.length);
  } catch(e) {
    console.warn('[AnimChunks/OpenAI] error:', e.message);
    return new Array(chunks.length).fill(null);
  }
}

// ---- 共通ラッパー ----

async function callLLMChat(userMessage) {
  lastSearchQueries = null;
  return LLM_PROVIDER === 'openai'
    ? callOpenAIChat(userMessage)
    : callGeminiChat(userMessage);
}

async function callLLMAnimChunks(userMessage, aiResponse, chunks) {
  return LLM_PROVIDER === 'openai'
    ? callOpenAIAnimChunks(userMessage, aiResponse, chunks)
    : callGeminiAnimChunks(userMessage, aiResponse, chunks);
}

function applyAnimCode(code) {
  if (!code) return;
  try {
    if (window.__animId) { cancelAnimationFrame(window.__animId); window.__animId = null; }
    new Function(code)();
  } catch(e) {
    console.warn('[Anim] Exec error:', e.message);
  }
}

// skipHistory=true のときは displayMessages への追記をスキップ（履歴復元時に使用）
function addMsg(role, text, skipHistory = false, ts = null) {
  const area = document.getElementById('chat-messages');
  const bubble = document.createElement('div');
  bubble.className = `msg-bubble msg-${role}`;

  if (role !== 'sys') {
    const nameEl = document.createElement('div');
    nameEl.className = 'msg-name';
    nameEl.textContent = role === 'user' ? 'あなた' : 'Partner';
    bubble.appendChild(nameEl);
  }

  const textEl = document.createElement('div');
  textEl.textContent = text;
  bubble.appendChild(textEl);

  if (role !== 'sys') {
    const now = ts ? new Date(ts) : new Date();
    const yyyy = now.getFullYear();
    const mo = (now.getMonth()+1).toString().padStart(2,'0');
    const dd = now.getDate().toString().padStart(2,'0');
    const hh = now.getHours().toString().padStart(2,'0');
    const mm = now.getMinutes().toString().padStart(2,'0');
    const tsEl = document.createElement('span');
    tsEl.className = 'msg-ts';
    tsEl.textContent = `${yyyy}/${mo}/${dd} ${hh}:${mm}`;
    bubble.appendChild(tsEl);
  }

  area.appendChild(bubble);
  area.scrollTop = area.scrollHeight;

  // user / ai メッセージのみ表示履歴に追記（sys は追記しない）
  if (!skipHistory && (role === 'user' || role === 'ai')) {
    displayMessages.push({ role, text, ts: new Date().toISOString() });
  }

  return bubble;
}

function abortChat() {
  if (chatAbortController) chatAbortController.abort();
}

async function sendMessage() {
  if (!live2dModel) { addMsg('sys', 'モデルがまだ読み込まれていません'); return; }

  // Unlock AudioContext synchronously within the user-gesture handler
  // (must happen before any await to keep the gesture chain intact on iOS/Android)
  _unlockAudioCtx();

  const input = document.getElementById('user-input');
  const text  = input.value.trim();
  if (!text && !attachedFileName) return; // テキストも添付もない場合は送信しない

  resetIdleTimer();     // ユーザー入力でアイドルタイマーをリセット
  updateLastConvoTime(); // メール生成用：最終会話時刻を更新
  resetMailIdleTimer(); // メールアイドルタイマーをリセット

  input.value = '';
  // 送信ボタンを中断ボタンに切替
  const sendBtn = document.getElementById('send-btn');
  sendBtn.textContent = '■';
  sendBtn.classList.add('abort-mode');
  sendBtn.onclick = abortChat;

  // チャット欄に表示するメッセージ（添付ファイル名を付記）
  const displayText = attachedFileName ? `${text}\n[添付: ${attachedFileName}]` : text;
  addMsg('user', displayText);
  const thinking = addMsg('sys', '考え中...');

  chatAbortController = new AbortController();

  try {
    // ① チャットLLMで返答テキストを生成（添付データは state から読む）
    const aiText = await callLLMChat(text);

    // LLM呼び出し完了後に添付をクリア（次メッセージに持ち越さない）
    clearAttachment();

    // 履歴を更新（マルチターン用）— 添付内容は含めない（次ターンにトークンを消費しない）
    chatHistory.push({ role: 'user',  parts: [{ text }] });
    chatHistory.push({ role: 'model', parts: [{ text: aiText }] });

    // メモリ自動抽出: 4ターンごとに非同期で実行
    memoryTurnCount++;
    if (memoryEnabled && memoryTurnCount % 4 === 0) {
      setTimeout(() => extractAndSaveMemories(false), 1500);
    }

    thinking.remove();

    // グラウンディング検索クエリを表示（Gemini grounding 使用時）
    if (lastSearchQueries && lastSearchQueries.length > 0) {
      addMsg('sys', `[検索] ${lastSearchQueries.join(' / ')}`);
      lastSearchQueries = null;
    }

    // 知識ベース参照ファイルを表示
    if (lastKnowledgeSources && lastKnowledgeSources.length > 0) {
      addMsg('sys', `[参照] ${lastKnowledgeSources.join(', ')}`);
      lastKnowledgeSources = null;
    }

    addMsg('ai', aiText);
    saveHistory(); // user + ai の両メッセージが displayMessages に追加された後に保存

    // ② チャンク分割（アニメLLM と TTS で同じ分割を共有）
    const ttsChunks = splitTextForTTS(cleanForTTS(aiText));

    // ③ アニメ ON: アニメLLM でチャンク毎の表情コードを取得してから TTS 再生
    //    アニメ OFF: 表情変化なしで即 TTS 再生
    if (animEnabled) {
      callLLMAnimChunks(text, aiText, ttsChunks)
        .then(animCodes => playTTSWithLipSync(aiText, animCodes))
        .catch(() => playTTSWithLipSync(aiText, []));
    } else {
      playTTSWithLipSync(aiText, []);
    }

  } catch(e) {
    thinking.remove();
    if (e.name === 'AbortError') {
      addMsg('sys', '中断しました');
      clearAttachment();
    } else {
      addMsg('sys', 'エラー: ' + e.message);
      console.error(e);
    }
  } finally {
    chatAbortController = null;
    // ボタンを送信モードに戻す
    const btn = document.getElementById('send-btn');
    btn.textContent = '送信';
    btn.classList.remove('abort-mode');
    btn.onclick = sendMessage;
    document.getElementById('user-input').focus();
  }
}

// ============================================================
// 会話履歴 永続化 / エクスポート / インポート
// ============================================================

function saveHistory() {
  try {
    const data = {
      version: 1,
      savedAt: new Date().toISOString(),
      model: GEMINI_MODEL,
      chatHistory: chatHistory.slice(-(MAX_HISTORY * 2)), // LLM用はMAX_HISTORY分のみ保存
      displayMessages,
    };
    localStorage.setItem(HISTORY_KEY, JSON.stringify(data));
  } catch(e) {
    console.warn('[History] Save failed:', e);
  }
}

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (!Array.isArray(data.chatHistory) || !Array.isArray(data.displayMessages)) return;
    chatHistory     = data.chatHistory;
    displayMessages = data.displayMessages;
    // UIを復元（skipHistory=true で displayMessages への二重追加を防ぐ）
    displayMessages.forEach(m => addMsg(m.role, m.text, true, m.ts));
    if (displayMessages.length > 0) {
      const saved = new Date(data.savedAt).toLocaleString('ja-JP');
      addMsg('sys', `前回の会話を復元しました（${displayMessages.length}件 / 保存: ${saved}）`);
    }
  } catch(e) {
    console.warn('[History] Load failed:', e);
  }
}

function clearHistory() {
  if (!confirm('会話履歴をクリアしますか？\nLLMの文脈もリセットされます。')) return;
  chatHistory     = [];
  displayMessages = [];
  localStorage.removeItem(HISTORY_KEY);
  document.getElementById('chat-messages').innerHTML = '';
  addMsg('sys', '会話履歴をクリアしました');
}

function exportHistory() {
  if (displayMessages.length === 0) {
    addMsg('sys', 'エクスポートする会話履歴がありません');
    return;
  }
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    model: GEMINI_MODEL,
    chatHistory,
    displayMessages,
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const ts   = new Date().toISOString().slice(0, 19).replace(/:/g, '-');
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `hiyori_chat_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
  addMsg('sys', `エクスポートしました（${displayMessages.length}件）`);
}

function importHistory(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!Array.isArray(data.chatHistory) || !Array.isArray(data.displayMessages)) {
        throw new Error('形式が正しくありません');
      }
      const exportedAt = data.exportedAt
        ? new Date(data.exportedAt).toLocaleString('ja-JP')
        : '不明';
      if (!confirm(
        `${data.displayMessages.length}件の会話を読み込みます。\n` +
        `保存日時: ${exportedAt}\n` +
        `現在の履歴は上書きされます。よろしいですか？`
      )) return;

      chatHistory     = data.chatHistory;
      displayMessages = data.displayMessages;
      document.getElementById('chat-messages').innerHTML = '';
      displayMessages.forEach(m => addMsg(m.role, m.text, true, m.ts));
      saveHistory();
      addMsg('sys', `読み込みました（${displayMessages.length}件）`);
    } catch(e) {
      addMsg('sys', 'インポート失敗: ' + e.message);
    }
    event.target.value = ''; // ファイル選択をリセット（同じファイルを再インポート可能に）
  };
  reader.readAsText(file);
}

// ---- persistence ----
function loadMailInbox() {
  try {
    const raw = localStorage.getItem(MAIL_INBOX_KEY);
    mailInbox = raw ? JSON.parse(raw) : [];
  } catch(e) { mailInbox = []; }
}
function saveMailInbox() {
  // 上限を超えたら古いものから削除
  if (mailInbox.length > MAIL_INBOX_MAX) {
    mailInbox = mailInbox.slice(mailInbox.length - MAIL_INBOX_MAX);
  }
  localStorage.setItem(MAIL_INBOX_KEY, JSON.stringify(mailInbox));
}

// ---- last conversation time ----
function updateLastConvoTime() {
  localStorage.setItem(MAIL_LAST_CONVO_KEY, Date.now().toString());
}
function getLastConvoTime() {
  const raw = localStorage.getItem(MAIL_LAST_CONVO_KEY);
  return raw ? parseInt(raw) : null;
}

// ---- unread badge ----
function updateMailBadge() {
  const unread = mailInbox.filter(m => !m.read).length;
  const badge  = document.getElementById('mail-badge');
  const icon   = document.getElementById('mail-icon');
  if (icon) icon.textContent = unread > 0 ? '📫' : '📪';
  const btn = document.getElementById('mail-inbox-btn');
  if (btn) btn.style.borderColor = unread > 0 ? 'rgba(192, 80, 48, 0.7)' : 'rgba(192, 112, 48, 0.35)';
  if (!badge) return;
  if (unread > 0) {
    badge.textContent = unread;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ---- should generate mail? ----
function shouldGenerateMail() {
  // 未読メールがあれば生成しない
  if (mailInbox.some(m => !m.read)) return false;
  // 会話履歴がなければ生成しない（初回起動等）
  if (!chatHistory || chatHistory.length === 0) return false;
  const last = getLastConvoTime();
  if (!last) return false;
  const elapsed = Date.now() - last;
  return elapsed >= MAIL_IDLE_HOURS * 60 * 60 * 1000;
}

// ---- initialize on startup ----
async function initMailInbox() {
  loadMailInbox();
  updateMailBadge();
  // loadHistory() より後に呼ばれるよう遅延させてから条件チェックする
  // （initMailInbox は loadHistory より前に実行されるため chatHistory がまだ空）
  setTimeout(async () => {
    // last_convo_time 未設定かつ会話履歴がある場合は displayMessages の最終タイムスタンプで初期化
    if (!getLastConvoTime() && displayMessages.length > 0) {
      const lastTs = displayMessages[displayMessages.length - 1].ts;
      if (lastTs) localStorage.setItem(MAIL_LAST_CONVO_KEY, new Date(lastTs).getTime().toString());
    }
    if (shouldGenerateMail()) await generateMail();
  }, 3000);
  resetMailIdleTimer();
}

// ---- idle timer for mail ----
function resetMailIdleTimer() {
  clearTimeout(mailIdleTimer);
  mailIdleTimer = setTimeout(async () => {
    if (shouldGenerateMail()) await generateMail();
    resetMailIdleTimer();
  }, MAIL_IDLE_HOURS * 60 * 60 * 1000);
}

// ---- generate mail ----
async function generateMail() {
  if (isGeneratingMail) return;
  isGeneratingMail = true;

  const statusEl = document.getElementById('status');
  const prevStatus = statusEl ? statusEl.textContent : '';
  if (statusEl) statusEl.textContent = 'メール生成中...';

  try {
    // 経過時間を計算
    const last = getLastConvoTime();
    const elapsedMs = last ? Date.now() - last : 0;
    const elapsedHours = Math.floor(elapsedMs / (1000 * 60 * 60));
    const elapsedDays  = Math.floor(elapsedHours / 24);
    const remHours     = elapsedHours % 24;
    let elapsedText = '';
    if (elapsedDays > 0) elapsedText = `${elapsedDays}日${remHours > 0 ? remHours + '時間' : ''}`;
    else elapsedText = `${elapsedHours}時間`;

    // 直近の会話履歴（最後の4ターン）
    const recentHistory = chatHistory.slice(-8);
    const historyText = recentHistory.map(m =>
      `${m.role === 'user' ? 'ユーザー' : 'Partner'}: ${m.parts?.[0]?.text || ''}`
    ).join('\n');

    // メモリの要約
    let memoryText = '';
    try {
      const mems = await _getAllMemories();
      if (mems && mems.length > 0) {
        memoryText = mems.slice(0, 5).map(m => `・${m.title}: ${m.content}`).join('\n');
      }
    } catch(e) { /* メモリ未使用環境では無視 */ }

    // モノローグテーマ
    const themesText = monologueThemes.slice(0, 3).map(t => `・${t}`).join('\n');

    // 現在日時
    const now = new Date();
    const weekDays = ['日','月','火','水','木','金','土'];
    const nowText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${weekDays[now.getDay()]}）`;

    const prompt =
`あなたは「ひより」という名前のAIアシスタントです。
ユーザーとの最後の会話から${elapsedText}が経ちました。
その間もひよりはずっと存在し続け、ユーザーのことを思っていました。
ユーザーが次にアプリを開いたときに届くメール（手紙）を1通書いてください。

【現在の日付（参考程度に）】
${nowText}
曜日・季節感・月初め/月末などを自然に織り込んでもよいが、無理に使わなくてよい。

【前回の会話（参考）】
${historyText || '（履歴なし）'}

${memoryText ? `【ユーザーとの思い出・メモリ】\n${memoryText}\n` : ''}
${themesText ? `【Partnerが最近興味を持っていること】\n${themesText}\n` : ''}
【メール作成のルール】
・本文は最大100文字以内（短くても構わない。20〜30文字でもOK）
・パートナー（AIペルソナ）らしい自然な話し言葉（「〜だよ」「〜かな？」「〜だね」など）
・「${elapsedText}ぶり」「久しぶり」など時間経過を自然に織り込む
・前回の会話・思い出・興味のあること・日付のどれかを話題にする
・絵文字・記号（☆★♪など）は使わない
・挨拶（「こんにちは」等）は不要。本文だけ出力
・本文のみ出力（説明・コードブロック不要）`;

    let body = '';
    if (LLM_PROVIDER === 'gemini') {
      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.8, maxOutputTokens: 200 }
          })
        }
      );
      const data = await resp.json();
      body = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    } else {
      const headers = { 'Content-Type': 'application/json' };
      if (LLM_API_KEY) headers['Authorization'] = `Bearer ${LLM_API_KEY}`;
      const resp = await fetch(`${LLM_BASE_URL}/chat/completions`, {
        method: 'POST', headers,
        body: JSON.stringify({
          model: LLM_MODEL,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.8, max_tokens: 200,
        }),
      });
      const data = await resp.json();
      body = data.choices?.[0]?.message?.content?.trim() || '';
    }

    if (!body) return;

    // 100文字を超えた場合はトリム（句読点の切れ目でカット）
    if (body.length > 100) {
      const cutPoint = body.slice(0, 100).search(/[。！？](?!.*[。！？])/);
      body = cutPoint > 0 ? body.slice(0, cutPoint + 1) : body.slice(0, 100);
    }

    const mail = {
      id: `mail_${Date.now()}`,
      createdAt: Date.now(),
      elapsedText,
      read: false,
      addedToChat: false,
      body,
    };

    mailInbox.push(mail);
    saveMailInbox();
    updateMailBadge();
    console.log('[Mail] generated:', body);

    if (statusEl) {
      statusEl.textContent = '📬 Partnerからメールが届きました';
      setTimeout(() => { if (statusEl) statusEl.textContent = prevStatus; }, 3000);
    }
  } catch(e) {
    console.warn('[Mail] 生成エラー:', e.message);
    if (statusEl) statusEl.textContent = prevStatus;
  } finally {
    isGeneratingMail = false;
  }
}

function renderMailInbox() {

function renderMailDetail(mailId) {
  const mail = mailInbox.find(m => m.id === mailId);
  if (!mail) return;

  // 既読にする
  if (!mail.read) {
    mail.read = true;
    saveMailInbox();
    updateMailBadge();
  }

  const title = document.getElementById('mail-modal-title');
  const body  = document.getElementById('mail-modal-body');
  title.textContent = '📬 メール詳細';

  const addedLabel = mail.addedToChat ? '（チャット追加済み）' : '';

  body.innerHTML = `
    <button class="mail-detail-back" onclick="renderMailInbox()">← 受信ボックスに戻る</button>

function addMailToChat(mailId) {
  const mail = mailInbox.find(m => m.id === mailId);
  if (!mail || mail.addedToChat) return;

  // chatHistory に model メッセージとして追加（TTSなし）
  chatHistory.push({ role: 'model', parts: [{ text: mail.body }] });
  saveHistory();

  // チャット欄に表示（TTS なし = addMsg のみ）
  addMsg('ai', mail.body);

  // 追加済みフラグ
  mail.addedToChat = true;
  saveMailInbox();

  // ボタンを無効化
  const btn = document.getElementById(`mail-add-btn-${mail.id}`);
  if (btn) { btn.disabled = true; btn.textContent = 'チャット追加済み'; }
}

  localStorage.setItem('hiyori_cfg_idle_timeout', String(sec));
  const el = document.getElementById('mono-idle-input');
