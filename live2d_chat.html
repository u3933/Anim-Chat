// ---- speak one monologue ----
async function speakMonologue() {
  if (isSpeaking) { resetIdleTimer(); return; }  // TTS中なら先送り
  if (!live2dModel) { resetIdleTimer(); return; }

  let line = '';
  if (monologueStock.length > 0) {
    line = monologueStock.shift();
    saveMonologueStock();
  } else {
    // フォールバック
    line = FALLBACK_MONOLOGUES[Math.floor(Math.random() * FALLBACK_MONOLOGUES.length)];
  }

  // チャット欄に表示
  addMsg('ai', line);

  // chatHistory に追加（ユーザーが返信できるよう）
  chatHistory.push({ role: 'model', parts: [{ text: line }] });
  updateLastConvoTime(); // 独り言も会話として記録（メール生成タイマーのリセット）
  resetMailIdleTimer();

  // TTS 再生
  const chunks = splitTextForTTS(cleanForTTS(line));
  if (animEnabled) {
    callLLMAnimChunks('', line, chunks)
      .then(codes => playTTSWithLipSync(line, codes))
      .catch(() => playTTSWithLipSync(line, []));
  } else {
    playTTSWithLipSync(line, []);
  }

  // ストックが少なくなったら補充
  if (monologueStock.length <= MONOLOGUE_STOCK_MIN && !isGeneratingMonologue) {
    setTimeout(() => generateMonologueStock(false), 2000);
  }

  // 次のアイドルタイマーをセット
  resetIdleTimer();
}

// ---- scenario generation ----
async function generateMonologueStock(manual = false) {
  if (isGeneratingMonologue) return;
  if (monologueThemes.length === 0) {
    if (manual) alert('テーマを1件以上設定してください');
    return;
  }
  if (monologueStock.length >= MONOLOGUE_STOCK_MAX) {
    if (manual) { updateMonologueDisplay(); }
    return;
  }

  isGeneratingMonologue = true;
  const statusEl = document.getElementById('status');
  const prevStatus = statusEl ? statusEl.textContent : '';
  if (statusEl) statusEl.textContent = '独り言生成中...';

  const count = Math.min(MONOLOGUE_GEN_COUNT, MONOLOGUE_STOCK_MAX - monologueStock.length);
  const themesText = monologueThemes.map(t => `・${t}`).join('\n');
  const stockText  = monologueStock.length > 0
    ? monologueStock.map(s => `・${s}`).join('\n')
    : '（なし）';

  const prompt =
`あなたは明るく元気なAIアシスタントです。
以下のテーマを参考に、パートナー（AIペルソナ）が一人でつぶやく独り言を${count}件生成してください。

テーマ（適宜選んで使用）:
${themesText}

【絶対に避けること】
・時間・時刻・朝/昼/夜/夕方に言及する内容（つぶやくタイミングが不定期なため不自然になる）
  NG例：「もう夜遅いね」「今日も一日頑張ったな」「朝はやっぱり眠いな」「もうこんな時間か」
・以下の既存ストックと同じ話題・表現の繰り返し:
${stockText}

【出力形式（厳守）】
・1行につき1件の独り言のみ出力
・番号・記号・話者名は不要
・2〜3文程度、自然なタメ口（「〜だよ！」「〜だね」「〜かな？」など）
・絵文字・記号（☆★♪など）は使わない
・ユーザーへの呼びかけなし（独り言なので）
・${count}件、それぞれ異なる話題で

出力例:
最近また読書にはまってるんだよね。活字を追ってると、なんか頭が落ち着く気がする。次は何を読もうかな。`;

  try {
    let responseText = '';
    if (LLM_PROVIDER === 'gemini') {
      const body = {
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.9, maxOutputTokens: 800 },
      };
      // Gemini の場合は grounding（最新情報取得）を有効化
      if (groundingEnabled) body.tools = [{ googleSearch: {} }];
      else body.tools = [{ googleSearch: {} }];  // 独り言生成では常に検索有効

      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      );
      const data = await resp.json();
      responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    } else {
      const headers = { 'Content-Type': 'application/json' };
      if (LLM_API_KEY) headers['Authorization'] = `Bearer ${LLM_API_KEY}`;
      const resp = await fetch(`${LLM_BASE_URL}/chat/completions`, {
        method: 'POST', headers,
        body: JSON.stringify({
          model: LLM_MODEL,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.9,
          max_tokens: 800,
        }),
      });
      const data = await resp.json();
      responseText = data.choices?.[0]?.message?.content || '';
    }

    // パース: 空行を除いて各行を独り言1件として取得
    const lines = responseText
      .split(/\r?\n/)
      .map(l => l.trim())
      .filter(l => l.length > 5 && !l.startsWith('・') && !l.startsWith('-') && !l.match(/^[\d]+[\.．]/));

    if (lines.length > 0) {
      monologueStock.push(...lines.slice(0, count));
      if (monologueStock.length > MONOLOGUE_STOCK_MAX) {
        monologueStock = monologueStock.slice(0, MONOLOGUE_STOCK_MAX);
      }
      saveMonologueStock();
      if (statusEl) {
        statusEl.textContent = `独り言 ${monologueStock.length}件ストック`;
        setTimeout(() => { if (statusEl) statusEl.textContent = prevStatus; }, 2500);
      }
    } else {
      if (statusEl) statusEl.textContent = prevStatus;
    }
  } catch(e) {
    console.warn('[Monologue] 生成エラー:', e.message);
    if (statusEl) statusEl.textContent = prevStatus;
  } finally {
    isGeneratingMonologue = false;
    if (manual) updateMonologueDisplay();
  }
}

async function handleAttachFile(input) {
  const file = input.files[0];
  input.value = ''; // 同じファイルを再選択できるようリセット
  if (!file) return;

  const isImage = file.type.startsWith('image/');
  const isPDF   = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
  const isText  = !isImage; // txt / md / pdf すべてテキスト系として扱う

  try {
    if (isImage) {
      // 画像: base64 に変換
      const base64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = e => resolve(e.target.result.split(',')[1]); // data URL の base64 部分のみ
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      attachedFileType    = 'image';
      attachedFileName    = file.name;
      attachedMimeType    = file.type || 'image/jpeg';
      attachedBase64      = base64;
      attachedTextContent = '';
    } else if (isPDF) {
      // PDF: PDF.js でテキスト抽出
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      for (let i = 1; i <= pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(item => item.str).join(' ') + '\n';
      }
      attachedFileType    = 'text';
      attachedFileName    = file.name;
      attachedMimeType    = '';
      attachedTextContent = fullText.trim();
      attachedBase64      = '';
    } else {
      // テキスト (TXT / MD)
      const text = await file.text();
      attachedFileType    = 'text';
      attachedFileName    = file.name;
      attachedMimeType    = '';
      attachedTextContent = text;
      attachedBase64      = '';
    }

    // UI 更新
    const chip = document.getElementById('attach-chip');
    document.getElementById('attach-chip-icon').textContent = isImage ? '🖼️' : '📄';
    document.getElementById('attach-chip-name').textContent = file.name;
    chip.classList.add('visible');
    document.getElementById('attach-btn').classList.add('has-file');

  } catch(e) {
    alert('ファイルの読み込みに失敗しました:\n' + e.message);
    clearAttachment();
  }
}

function clearAttachment() {
  attachedFileType    = null;
  attachedFileName    = '';
  attachedMimeType    = '';
  attachedTextContent = '';
  attachedBase64      = '';

  document.getElementById('attach-chip').classList.remove('visible');
  document.getElementById('attach-btn').classList.remove('has-file');
}

async function _gatherSessionData() {
  // localStorage の対象キーを収集
  const ls = {};
  for (const key of LS_SYNC_KEYS) {
    const val = localStorage.getItem(key);
    if (val !== null) ls[key] = val;
  }
  // メモリ（IndexedDB）を収集
  const memories = await _getAllMemories().catch(() => []);
  return {
    version:   1,
    savedAt:   new Date().toISOString(),
    localStorage: ls,
    memories,
  };
}

async function _applySessionData(data) {
  if (!data || data.version !== 1) throw new Error('不正なセッションデータです');

  // localStorage を復元
  if (data.localStorage) {
    for (const [key, val] of Object.entries(data.localStorage)) {
      localStorage.setItem(key, val);
    }
  }

  // メモリを復元（既存は全削除してから追加）
  if (Array.isArray(data.memories) && memoryDB) {
    const existing = await _getAllMemories();
    for (const m of existing) await _deleteMemory(m.id);
    for (const m of data.memories) {
      await _addMemory({
        category:       m.category,
        subject:        m.subject,
        summary:        m.summary,
        keywords:       m.keywords || [],
        createdAt:      m.createdAt,
        lastAccessedAt: m.lastAccessedAt,
      });
    }
  }

  // メール受信ボックスを即時反映（localStorage 書き込み後に変数・UIを更新）
  loadMailInbox();
  updateMailBadge();
}

async function gistSave() {
  const token = document.getElementById('gist-token').value.trim();
  if (!token) { _gistSetStatus('トークンを入力してください', '#e09070'); return; }

  _gistSetStatus('保存中...', '#a0b8d0');
  try {
    const data    = await _gatherSessionData();
    const content = JSON.stringify(data, null, 2);
    const gistId  = document.getElementById('gist-id').value.trim();

    let resp, result;
    if (gistId) {
      // 既存 Gist を更新
      resp = await fetch(`https://api.github.com/gists/${gistId}`, {
        method:  'PATCH',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ files: { [GIST_FILENAME]: { content } } }),
      });
    } else {
      // 新規 Gist を作成
      resp = await fetch('https://api.github.com/gists', {
        method:  'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          description: 'hiyori-chat session',
          public: false,
          files: { [GIST_FILENAME]: { content } },
        }),
      });
    }

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }
    result = await resp.json();

    // Gist ID を保存・表示
    const newId = result.id;
    localStorage.setItem(GIST_ID_KEY, newId);
    document.getElementById('gist-id').value = newId;

    const memCount = (await _getAllMemories().catch(() => [])).length;
    _gistSetStatus(`保存完了（メモリ ${memCount}件）`, '#90c090');
  } catch(e) {
    _gistSetStatus('保存失敗: ' + e.message, '#e07060');
    console.error('[Gist] save error:', e);
  }
}

async function gistRestore() {
  const token  = document.getElementById('gist-token').value.trim();
  const gistId = document.getElementById('gist-id').value.trim();
  if (!token)  { _gistSetStatus('トークンを入力してください', '#e09070'); return; }
  if (!gistId) { _gistSetStatus('Gist IDを入力してください', '#e09070'); return; }
  if (!confirm('現在のデータを上書きして Gist から復元しますか？')) return;

  _gistSetStatus('復元中...', '#a0b8d0');
  try {
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
      headers: { Authorization: `Bearer ${token}` },
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }
    const gist    = await resp.json();
    const fileObj = gist.files?.[GIST_FILENAME];
    if (!fileObj) throw new Error(`${GIST_FILENAME} が Gist に見つかりません`);

    // ファイルが truncate されている場合は raw_url から取得
    const rawContent = fileObj.truncated
      ? await (await fetch(fileObj.raw_url)).text()
      : fileObj.content;

    const data = JSON.parse(rawContent);
    await _applySessionData(data);

    await updateMemoryDisplay();
    _gistSetStatus(`復元完了（メモリ ${data.memories?.length ?? 0}件）\nページをリロードすると会話履歴が反映されます`, '#90c090');
  } catch(e) {
    _gistSetStatus('復元失敗: ' + e.message, '#e07060');
    console.error('[Gist] restore error:', e);
  }
}

// MEMORY SYSTEM

async function initMemoryDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(MEMORY_DB_NAME, 1);
    req.onerror = () => reject(req.error);
    req.onsuccess = () => { memoryDB = req.result; resolve(); };
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('memories')) {
        const store = db.createObjectStore('memories', { keyPath: 'id', autoIncrement: true });
        store.createIndex('category',       'category',       { unique: false });
        store.createIndex('createdAt',      'createdAt',      { unique: false });
        store.createIndex('lastAccessedAt', 'lastAccessedAt', { unique: false });
      }
    };
  });
}

async function _getAllMemories() {
  if (!memoryDB) return [];
  return new Promise((resolve, reject) => {
    const tx = memoryDB.transaction(['memories'], 'readonly');
    const req = tx.objectStore('memories').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror  = () => reject(req.error);
  });
}

async function _addMemory(mem) {
  if (!memoryDB) return;
  const all = await _getAllMemories();
  if (all.length >= MEMORY_LIMIT) {
    const oldest = all.sort((a,b) => new Date(a.createdAt) - new Date(b.createdAt))[0];
    await _deleteMemory(oldest.id);
  }
  return new Promise((resolve, reject) => {
    const tx = memoryDB.transaction(['memories'], 'readwrite');
    const req = tx.objectStore('memories').add({
      ...mem,
      createdAt: mem.createdAt || new Date().toISOString(),
      lastAccessedAt: new Date().toISOString(),
    });
    req.onsuccess = () => resolve(req.result);
    req.onerror   = () => reject(req.error);
  });
}

async function _updateMemory(id, updates) {
  if (!memoryDB) return;
  return new Promise((resolve, reject) => {
    const tx = memoryDB.transaction(['memories'], 'readwrite');
    const store = tx.objectStore('memories');
    const getReq = store.get(id);
    getReq.onsuccess = () => {
      const existing = getReq.result;
      if (!existing) { reject(new Error('not found')); return; }
      const updated = { ...existing, ...updates, lastAccessedAt: new Date().toISOString() };
      const putReq = store.put(updated);
      putReq.onsuccess = () => resolve(updated);
      putReq.onerror   = () => reject(putReq.error);
    };
  });
}

async function _deleteMemory(id) {
  if (!memoryDB) return;
  return new Promise((resolve, reject) => {
    const tx = memoryDB.transaction(['memories'], 'readwrite');
    const req = tx.objectStore('memories').delete(id);
    req.onsuccess = () => resolve();
    req.onerror   = () => reject(req.error);
  });
}

async function _searchMemories(query, category) {
  const all = await _getAllMemories();
  return all.filter(m => {
    if (category && m.category !== category) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!m.subject?.toLowerCase().includes(q) &&
          !m.summary?.toLowerCase().includes(q) &&
          !m.keywords?.some(k => k.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

function _escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function updateMemoryDisplay() {
  if (!memoryDB) return;
  const cat    = document.getElementById('memory-cat-filter').value;
  const search = document.getElementById('memory-search-input').value;
  const list   = document.getElementById('memory-list');
  const countEl = document.getElementById('memory-count-label');

  const [all, filtered] = await Promise.all([_getAllMemories(), _searchMemories(search, cat)]);
  countEl.textContent = `(${all.length}/${MEMORY_LIMIT})`;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="memory-empty">メモリなし</div>';
    return;
  }

  filtered.sort((a,b) => new Date(b.lastAccessedAt) - new Date(a.lastAccessedAt));
  list.innerHTML = filtered.map(m => `
    <div class="memory-card">
      <div class="memory-card-header">
        <span class="memory-card-cat">${_escHtml(m.category)}</span>
        <div class="memory-card-actions">
          <button onclick="editMemoryEntry(${m.id})">✏️</button>
          <button class="del" onclick="deleteMemoryEntry(${m.id})">✕</button>
        </div>
      </div>
      <div class="memory-card-subject">${_escHtml(m.subject)}</div>
      <div class="memory-card-summary">${_escHtml(m.summary)}</div>
      ${m.keywords?.length ? `<div class="memory-card-keywords">${m.keywords.map(k=>`<span class="memory-card-kw">${_escHtml(k)}</span>`).join('')}</div>` : ''}
      <div class="memory-card-meta">
        <span>作成: ${new Date(m.createdAt).toLocaleDateString('ja-JP')}</span>
        <span>更新: ${new Date(m.lastAccessedAt).toLocaleDateString('ja-JP')}</span>
      </div>
    </div>
  `).join('');
}

async function buildMemoryContext() {
  if (!memoryEnabled || !memoryDB) return '';
  const all = await _getAllMemories();
  if (all.length === 0) return '';
  const sorted = all.sort((a,b) => new Date(b.lastAccessedAt) - new Date(a.lastAccessedAt)).slice(0, 20);
  return '\n\n【ユーザーに関する記憶】\n' + sorted.map(m => `- ${m.subject}: ${m.summary}`).join('\n');
}

async function extractAndSaveMemories(manual = false) {
  if (!manual && !memoryEnabled) return;
  if (chatHistory.length < 2) return;

  const existingAll = await _getAllMemories();
  const existingSummary = existingAll.slice(0, 20).map(m =>
    `[ID:${m.id}] ${m.category}: ${m.subject} - ${m.summary.substring(0, 50)}...`
  ).join('\n');

  const recentHistory = chatHistory.slice(-8);
  const convText = recentHistory.map(m =>
    `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.parts[0].text}`
  ).join('\n\n');

  const prompt = `You are a memory extraction system. Analyze the conversation and extract any new information worth remembering about the User (not the Assistant).

EXISTING MEMORIES (do not duplicate, but UPDATE if new info relates to these):
${existingSummary || '(none)'}

CONVERSATION:
${convText}

If there is new information to remember, output a JSON array. Each item:
{
  "action": "create" or "update",
  "id": null for create, existing ID number for update,
  "category": "人物" | "好み" | "経験" | "仕事" | "関係" | "場所" | "その他",
  "subject": "short title in Japanese",
  "summary": "detailed summary in Japanese",
  "keywords": ["keyword1", "keyword2"]
}
Rules:
- Only extract information about the USER
- For updates, merge/expand the existing summary
- If no new info worth remembering, output: []
Output ONLY the JSON array, no other text:`;

  try {
    const statusEl = document.getElementById('status');
    const prevStatus = statusEl.textContent;
    statusEl.textContent = 'メモリ抽出中...';

    let responseText = '';
    if (LLM_PROVIDER === 'gemini') {
      const resp = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`,
        { method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 1000 } }) }
      );
      const data = await resp.json();
      responseText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    } else {
      const headers = { 'Content-Type': 'application/json' };
      if (LLM_API_KEY) headers['Authorization'] = `Bearer ${LLM_API_KEY}`;
      const resp = await fetch(`${LLM_BASE_URL}/chat/completions`, {
        method: 'POST', headers,
        body: JSON.stringify({ model: LLM_MODEL,
          messages: [{ role: 'user', content: prompt }],
          max_tokens: 1000, temperature: 0.3 })
      });
      const data = await resp.json();
      responseText = data.choices?.[0]?.message?.content || '';
    }

    const match = responseText.match(/\[[\s\S]*\]/);
    if (match) {
      const actions = JSON.parse(match[0]);
      for (const a of actions) {
        if (a.action === 'update' && a.id) {
          await _updateMemory(a.id, { summary: a.summary, keywords: a.keywords || [] });
        } else if (a.action === 'create') {
          await _addMemory({ category: a.category, subject: a.subject,
                             summary: a.summary, keywords: a.keywords || [] });
        }
      }
      if (actions.length > 0) {
        statusEl.textContent = `メモリ ${actions.length}件処理`;
        if (document.getElementById('memory-modal-overlay').classList.contains('open')) {
          updateMemoryDisplay();
        }
      } else {
        statusEl.textContent = '新メモリなし';
      }
      setTimeout(() => { statusEl.textContent = prevStatus; }, 2000);
    }
  } catch(e) {
    console.warn('[Memory] 抽出エラー:', e.message);
  }
}

async function requestMemoryExtract() {
  if (chatHistory.length < 2) { alert('会話履歴が少なすぎます'); return; }
  await extractAndSaveMemories(true);
  await updateMemoryDisplay();
}

async function addMemoryManually() {
  const cat = prompt('カテゴリ (人物/好み/経験/仕事/関係/場所/その他):', '好み');
  if (!cat) return;
  const subject = prompt('タイトル:', '');
  if (!subject) return;
  const summary = prompt('内容:', '');
  if (!summary) return;
  const kwStr = prompt('キーワード (カンマ区切り):', '');
  const keywords = kwStr ? kwStr.split(',').map(k => k.trim()).filter(Boolean) : [];
  await _addMemory({ category: cat, subject, summary, keywords });
  await updateMemoryDisplay();
}

async function editMemoryEntry(id) {
  const all = await _getAllMemories();
  const m = all.find(x => x.id === id);
  if (!m) return;
  const newSummary = prompt('内容を編集:', m.summary);
  if (newSummary === null) return;
  const newKwStr = prompt('キーワード (カンマ区切り):', (m.keywords || []).join(', '));
  const newKw = newKwStr ? newKwStr.split(',').map(k => k.trim()).filter(Boolean) : [];
  await _updateMemory(id, { summary: newSummary, keywords: newKw });
  await updateMemoryDisplay();
}

async function deleteMemoryEntry(id) {
  if (!confirm('このメモリを削除しますか？')) return;
  await _deleteMemory(id);
  await updateMemoryDisplay();
}

async function clearAllMemories() {
  if (!confirm('全てのメモリを削除しますか？この操作は取り消せません。')) return;
  const all = await _getAllMemories();
  for (const m of all) await _deleteMemory(m.id);
  await updateMemoryDisplay();
}

async function exportMemories() {
  const all = await _getAllMemories();
  if (all.length === 0) { alert('エクスポートするメモリがありません'); return; }
  const blob = new Blob([JSON.stringify(all, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `hiyori_memories_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importMemoriesFromFile() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    try {
      const arr = JSON.parse(await file.text());
      if (!Array.isArray(arr)) throw new Error('配列形式が必要です');
      if (!confirm(`${arr.length}件のメモリをインポートしますか？`)) return;
      for (const m of arr) await _addMemory({ category: m.category, subject: m.subject,
        summary: m.summary, keywords: m.keywords || [] });
      await updateMemoryDisplay();
    } catch(err) { alert('インポートエラー: ' + err.message); }
  };
  input.click();
}
