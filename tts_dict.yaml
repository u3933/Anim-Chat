# TTS 読み辞書
#
# 形式:
#   表記: かな読み
#
# ルール:
#   - 英数字のみの表記 → 大文字小文字を無視してマッチ（word境界あり）
#   - 日本語を含む表記 → 完全一致でマッチ
#   - 長い表記から優先適用されるため、部分一致の問題は起きない
#
# 例) python → ぱいそん、AI → えーあい

words:
  # ── プログラミング / IT 用語 ──────────────────────
  Python: ぱいそん
  API: えーぴーあい
  AI: えーあい
  TTS: てぃーてぃーえす
  STT: えすてぃーてぃー
  BGM: びーじーえむ
  LLM: えるえるえむ
  URL: ゆーあーるえる
  GPU: じーぴーゆー
  CPU: しーぴーゆー
  PC: ぴーしー
  Wi-Fi: わいふぁい
  WiFi: わいふぁい
  WebSocket: うぇぶそけっと
  GitHub: ぎっとはぶ
